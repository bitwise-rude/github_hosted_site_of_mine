name: Capture Discussions

on:
  discussion:
    types: [created]

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run capture script
        env:
          DISC_TITLE: ${{ github.event.discussion.title }}
          DISC_BODY: ${{ github.event.discussion.body }}
          DISC_USER: ${{ github.event.discussion.user.login }}
          DISC_URL: ${{ github.event.discussion.html_url }}
        run: python capture.py

      - name: Commit updated file
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add discussions.json
          git commit -m "Add discussion log" || exit 0
          git push
